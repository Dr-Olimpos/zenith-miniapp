<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith Alpha Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #111827);
            color: var(--tg-theme-text-color, #f3f4f6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .tg-card {
            background-color: var(--tg-theme-secondary-bg-color, #1f2937);
        }
        .tg-button {
            background-color: var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .accordion-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 500px; /* İçeriğe göre genişler */
            opacity: 1;
            overflow-y: auto;
        }
    </style>
</head>
<body class="p-4 antialiased">

    <!-- Üst Başlık -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/50">Z</div>
            <h1 class="text-xl font-bold tracking-wider">ZENITH <span class="text-blue-400">APEX</span></h1>
        </div>
        <div id="user-profile" class="text-sm font-medium opacity-80"></div>
    </div>

    <!-- İstatistik Kartları -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="tg-card rounded-xl p-4 shadow-sm border border-gray-700/50">
            <div class="flex items-center text-gray-400 mb-1 text-xs uppercase font-bold tracking-wider">
                <i class="fa-solid fa-users mr-2"></i> İzlenen Ağ
            </div>
            <div id="stat-monitored" class="text-2xl font-bold">--<span class="text-xs font-normal text-gray-500 ml-1">Hesap</span></div>
        </div>
        <div class="tg-card rounded-xl p-4 shadow-sm border border-gray-700/50">
            <div class="flex items-center text-green-400 mb-1 text-xs uppercase font-bold tracking-wider">
                <i class="fa-solid fa-bolt mr-2"></i> Canlı Faz
            </div>
            <div id="stat-phase" class="text-[10px] font-bold text-blue-400 mt-2 truncate">Bağlanıyor...</div>
        </div>
    </div>

    <!-- Dinamik ve Kategorize Edilmiş Filo Listesi -->
    <div class="flex justify-between items-center mb-3 border-b border-gray-700/50 pb-2">
        <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">📋 İstihbarat Ağı</h2>
        <button onclick="refreshData()" class="text-xs text-blue-400 flex items-center"><i class="fa-solid fa-rotate mr-1"></i> Yenile</button>
    </div>
    
    <div id="fleet-container" class="space-y-4 mb-6 pb-10">
        <p class="text-xs text-gray-500 italic">Güvenli tünel aranıyor, lütfen bekleyin...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-profile').innerText = "@" + tg.initDataUnsafe.user.username;
        }

        tg.MainButton.setText('DASHBOARD KAPAT');
        tg.MainButton.show();
        tg.MainButton.onClick(function() { tg.close(); });

        // Akordeon aç/kapat fonksiyonu
        window.toggleHistory = function(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        async function fetchLiveStats() {
            const targetUrl = 'http://165.232.68.11:8080/api/stats';
            let finalData = null;
            let isSuccess = false;

            // GELİŞMİŞ PROXY HAVUZU (Bağlantı kopmasını engeller)
            const proxies = [
                { url: 'https://api.allorigins.win/get?url=', type: 'contents' }, 
                { url: 'https://thingproxy.freeboard.io/fetch/', type: 'direct' },
                { url: 'https://api.codetabs.com/v1/proxy?quest=', type: 'direct' },
                { url: 'https://corsproxy.io/?', type: 'direct'}
            ];

            if (window.location.protocol === 'http:') {
                proxies.unshift({ url: '', type: 'direct' }); 
            }

            for (let proxy of proxies) {
                try {
                    const fetchUrl = proxy.url === '' ? targetUrl : proxy.url + encodeURIComponent(targetUrl);
                    
                    const response = await fetch(fetchUrl, {
                        method: 'GET',
                        cache: 'no-store',
                        signal: AbortSignal.timeout(6000) 
                    });
                    
                    if (response.ok) {
                        let data;
                        if (proxy.type === 'contents') {
                            const rawData = await response.json();
                            if (rawData && rawData.contents) {
                                data = JSON.parse(rawData.contents);
                            }
                        } else {
                            data = await response.json();
                        }
                        
                        if (data && typeof data === 'object' && 'monitored_count' in data) {
                            finalData = data;
                            isSuccess = true;
                            console.log("Bağlantı başarılı. Kullanılan Proxy:", proxy.url || "Direkt");
                            break; 
                        }
                    }
                } catch (error) {
                    console.warn(`[Proxy Atlandı] ${proxy.url || 'Direct'} yanıt vermedi.`);
                }
            }

            try {
                if (!isSuccess || !finalData) {
                    throw new Error("Tüm bağlantı köprüleri (proxyler) başarısız oldu.");
                }

                // İstatistikleri Ekrana Yazdır
                document.getElementById('stat-monitored').innerHTML = (finalData.monitored_count || 0) + '<span class="text-xs font-normal text-gray-500 ml-1">Balina</span>';
                
                const phaseEl = document.getElementById('stat-phase');
                phaseEl.innerText = finalData.status || "Veri Bekleniyor";
                phaseEl.className = "text-[10px] font-bold text-green-400 mt-2 truncate";

                // Verileri Kategoriye Göre Grupla
                const groupedAccounts = {};
                if (finalData.accounts && finalData.accounts.length > 0) {
                    finalData.accounts.forEach(acc => {
                        const catKey = `${acc.cat_emoji || '🌐'} ${acc.cat_name || 'Genel'}`;
                        if (!groupedAccounts[catKey]) groupedAccounts[catKey] = [];
                        groupedAccounts[catKey].push(acc);
                    });

                    const fleetContainer = document.getElementById('fleet-container');
                    fleetContainer.innerHTML = '';
                    
                    let globalIndex = 0;

                    // Grupları Ekrana Çiz
                    for (const [category, accounts] of Object.entries(groupedAccounts)) {
                        const catHeader = document.createElement('div');
                        catHeader.className = 'text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 ml-1';
                        catHeader.innerText = category;
                        fleetContainer.appendChild(catHeader);

                        accounts.forEach(acc => {
                            const histId = `hist-${globalIndex}`;
                            globalIndex++;

                            // Tarihçeyi HTML'e çevir
                            let historyHtml = '<div class="p-3 bg-[#17202e] text-xs text-gray-500 italic rounded-b-lg">Son 7 günde yeni takip yok.</div>';
                            
                            if (acc.history && acc.history.length > 0) {
                                const links = acc.history.map(h => 
                                    `<a href="https://x.com/${h.nick}" target="_blank" class="flex justify-between items-center p-2 mb-1 bg-gray-800 hover:bg-gray-700 rounded transition">
                                        <span class="text-blue-400 font-medium"><i class="fa-brands fa-twitter mr-1"></i> @${h.nick}</span>
                                        <span class="text-[10px] text-gray-500">${h.added_at}</span>
                                    </a>`
                                ).join('');
                                
                                historyHtml = `<div class="p-2 bg-[#17202e] rounded-b-lg border-t border-gray-700/50">${links}</div>`;
                            }

                            const div = document.createElement('div');
                            div.className = 'tg-card rounded-lg border border-gray-700/30 mb-2 shadow-sm';
                            
                            div.innerHTML = `
                                <!-- Tıklanabilir Üst Kısım -->
                                <div class="p-3 flex justify-between items-center cursor-pointer active:bg-gray-700 transition rounded-lg" onclick="toggleHistory('${histId}')">
                                    <div>
                                        <span class="text-sm font-bold">@${acc.username || 'Bilinmiyor'}</span>
                                        <div class="text-[10px] text-gray-400 mt-0.5">Takipler: ${acc.following || 0}</div>
                                    </div>
                                    <div class="flex items-center text-gray-500">
                                        <span class="text-[10px] mr-2 bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded">${acc.history ? acc.history.length : 0} Yeni</span>
                                        <i id="icon-${histId}" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
                                    </div>
                                </div>
                                <!-- Açılır/Kapanır Geçmiş İçeriği -->
                                <div id="${histId}" class="accordion-content">
                                    ${historyHtml}
                                </div>
                            `;
                            fleetContainer.appendChild(div);
                        });
                    }
                } else {
                    document.getElementById('fleet-container').innerHTML = '<p class="text-xs text-gray-500 italic">Henüz hesap eklenmemiş veya veritabanı boş.</p>';
                }
                
            } catch (error) {
                console.error("Nihai bağlantı hatası detayı:", error);
                const phaseEl = document.getElementById('stat-phase');
                phaseEl.innerText = "Tüneller Çöktü!";
                phaseEl.className = "text-[10px] font-bold text-red-400 mt-2 truncate"; 
                
                const fleetContainer = document.getElementById('fleet-container');
                if (fleetContainer.innerHTML.includes('Güvenli tünel') || fleetContainer.innerHTML.includes('Yenileniyor')) {
                     fleetContainer.innerHTML = `
                        <div class="p-3 border border-red-500/30 rounded-lg bg-red-500/10">
                            <p class="text-xs text-red-400 font-bold mb-1">⚠️ Sunucuya Ulaşılamıyor!</p>
                            <p class="text-[10px] text-gray-400">1. DigitalOcean sunucunuzda botun kapalı olma ihtimali yüksektir.</p>
                            <p class="text-[10px] text-gray-400">2. Lütfen sunucu terminalinden <b>systemctl status zenith.service</b> yazarak botun çalıştığından emin olun.</p>
                        </div>
                    `;
                }
            }
        }

        function refreshData() {
            const phaseEl = document.getElementById('stat-phase');
            phaseEl.innerText = "Güvenli Tünel Aranıyor...";
            phaseEl.className = "text-[10px] font-bold text-blue-400 mt-2 truncate";
            fetchLiveStats();
        }

        fetchLiveStats();
        // 15 Saniyede bir otomatik yeniler
        setInterval(fetchLiveStats, 15000);
    </script>
</body>
</html>
